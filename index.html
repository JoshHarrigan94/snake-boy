<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SnakeBoy 3D</title>

  <link rel="stylesheet" href="style.css" />

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
    defer>
  </script>

  <script src="app.js" defer></script>
</head>

<body>
  <div class="ambient-layer" aria-hidden="true">
    <div class="bg-orb bg-orb-one"></div>
    <div class="bg-orb bg-orb-two"></div>
    <div class="bg-orb bg-orb-three"></div>
    <div class="bg-grid"></div>
    <div class="bg-noise"></div>
  </div>

  <main class="app-shell">
    <header class="hud">
      <div>
        <p class="eyebrow">Definitely not a Game Boy</p>
        <h1>SnakeBoy 3D</h1>
      </div>

      <div class="score-card">
        <span>Score</span>
        <strong id="scoreValue">0</strong>
      </div>
    </header>

    <section class="stage-card">
      <div class="stage-label stage-label-left">RETRO HANDHELD SIMULATOR</div>
      <div class="stage-label stage-label-right">LCD MODE: ON</div>

      <div id="threeMount" class="three-mount"></div>

      <div class="status-panel">
        <p id="statusText">Press Start to play</p>
        <p class="controls">
          Phone: D-pad + Start · Keyboard: Arrow Keys / WASD / Space
        </p>
      </div>

      <nav class="touch-controls" aria-label="SnakeBoy touch controls">
        <div class="touch-dpad">
          <button class="touch-btn touch-up" data-control="up" aria-label="Move up">▲</button>
          <button class="touch-btn touch-left" data-control="left" aria-label="Move left">◀</button>
          <button class="touch-btn touch-right" data-control="right" aria-label="Move right">▶</button>
          <button class="touch-btn touch-down" data-control="down" aria-label="Move down">▼</button>
        </div>

        <div class="touch-actions">
          <button class="touch-action touch-b" data-control="b" aria-label="B button">B</button>
          <button class="touch-action touch-a" data-control="a" aria-label="A button">A</button>
        </div>

        <button class="touch-start" data-control="start" aria-label="Start or pause game">
          START
        </button>
      </nav>
    </section>

    <canvas
      id="snakeCanvas"
      width="256"
      height="256"
      aria-hidden="true">
    </canvas>
  </main>
</body>
</html>
